# Blueprint Render GRATUIT pour Defi Ayiti (monorepo backend Django + frontend React).
# Documentation complete du deploiement : docs/RENDER_DEPLOY.md
#
# Render n'offre pas de plan gratuit pour les Background Workers ni pour
# Redis/Key Value : seuls les Web Services (plan "free") et les sites
# statiques (toujours gratuits) sont inclus ici. Consequence : pas de
# Celery worker/beat, pas de Redis -- le backend degrade automatiquement
# vers un cache local et des taches Celery synchrones dans ce cas (voir
# backend/config/settings/base.py, bloc "if REDIS_URL"). Les classements
# et quetes fonctionnent toujours, juste sans planification en arriere-plan.
#
# Pour activer plus tard les workers + Redis (plan payant), voir
# render.full.yaml.
#
# Remarque : Supabase Postgres n'est PAS defini ici -- la base de donnees
# vit sur Supabase, pas sur Render. Seule la variable DATABASE_URL (definie
# manuellement dans le dashboard Render) y fait reference.
#
# A verifier avant deploiement : les cles exactes du schema de blueprint
# Render peuvent evoluer (notamment `runtime: static` pour les sites
# statiques) -- se referer a https://render.com/docs/blueprint-spec au
# moment du deploiement si Render signale une cle inconnue.

services:
  # API Django (ASGI, via Daphne) exposant REST + WebSocket
  - type: web
    name: defi-ayiti-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements/production.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false

  # Frontend PWA (site statique) -- alternative equivalente : Vercel ou Netlify
  - type: web
    name: defi-ayiti-app
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_FACEBOOK_APP_ID
        sync: false
    routes:
      # Fallback SPA : toute route inconnue sert index.html (React Router)
      - type: rewrite
        source: /*
        destination: /index.html
